<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iluvjkjm_ - รับทำเว็บไซต์ครบวงจร</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Mitr', 'sans-serif'] },
                    colors: {
                        cream: '#FFFFFF',
                        pinky: { light: '#FFF0F3', DEFAULT: '#FFB6C1', dark: '#FF889B' },
                        brown: { light: '#8B5E5E', DEFAULT: '#5D4037', dark: '#3E2723' }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(255, 182, 193, 0.3)',
                        'card': '0 10px 25px -5px rgba(255, 182, 193, 0.2)',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #FFFFFF; color: #5D4037; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #FFB6C1; border-radius: 10px; }
        .animate-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="antialiased selection:bg-pinky selection:text-white relative">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl relative overflow-hidden">
        
        <header class="bg-gradient-to-r from-pinky-light to-white pt-10 pb-8 px-6 relative rounded-b-[40px] shadow-sm z-10 border-b-4 border-pinky-light/30 flex items-center gap-5">
            <div class="w-24 h-24 rounded-2xl border-[4px] border-white shadow-md overflow-hidden bg-white">
                <img src="https://i.postimg.cc/nr1VxGpZ/IMG-7153.png" alt="Logo" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <h1 class="text-[34px] leading-tight font-bold text-brown mb-2">iluvjkjm_</h1>
                <p class="text-brown-light text-[11px] font-medium bg-white inline-block px-3 py-1.5 rounded-2xl shadow-sm border border-pinky-light/40 uppercase">รับทำเว็บไซต์แบบครบวงจร</p>
            </div>
        </header>

        <main class="px-6 py-8 space-y-10 relative z-10">

            <section class="space-y-6">
                <div class="bg-white rounded-[40px] p-8 shadow-card border border-pinky-light/30 relative">
                    <div class="absolute top-6 right-6 w-6 h-6 border border-pinky-light rounded-full flex items-center justify-center text-pinky text-[10px]">i</div>
                    <div class="flex items-center gap-2 mb-6">
                        <i data-lucide="search" class="w-6 h-6 text-pinky-dark"></i>
                        <h2 class="text-2xl font-bold text-pinky-dark">เช็คสถานะงาน</h2>
                    </div>
                    <p class="text-center text-pinky-dark/70 text-xs mb-4 font-medium">พิมพ์รหัสคิวงาน หรือ ชื่อลูกค้า ได้เลยนะคะ</p>
                    <div class="flex gap-2">
                        <input type="text" id="orderInput" placeholder="PJ0001..." 
                            class="flex-1 bg-pinky-light/30 border-none rounded-2xl py-4 px-6 text-brown focus:outline-none placeholder-pinky/60 shadow-inner">
                        <button onclick="checkStatus()" id="searchBtn" class="bg-pinky-dark hover:bg-pinky transition-colors rounded-2xl p-4 text-white shadow-md">
                            <i data-lucide="search" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <div class="flex items-center gap-2 mb-4 ml-2">
                        <i data-lucide="list-ordered" class="w-5 h-5 text-pinky-dark"></i>
                        <h3 class="text-lg font-bold text-pinky-dark">คิวปัจจุบัน</h3>
                    </div>
                    <div class="grid grid-cols-3 gap-3 text-center">
                        <div class="bg-white rounded-[30px] py-5 shadow-soft border border-pinky-light/20">
                            <p class="text-brown-light text-[10px] mb-1">รอทำ</p>
                            <p id="count-wait" class="text-3xl font-bold text-pinky-dark">0</p>
                        </div>
                        <div class="bg-white rounded-[30px] py-5 shadow-soft border border-pinky-light/20">
                            <p class="text-brown-light text-[10px] mb-1">กำลังทำ</p>
                            <p id="count-process" class="text-3xl font-bold text-orange-400">0</p>
                        </div>
                        <div class="bg-white rounded-[30px] py-5 shadow-soft border border-pinky-light/20">
                            <p class="text-brown-light text-[10px] mb-1">เสร็จสิ้น</p>
                            <p id="count-done" class="text-3xl font-bold text-green-400">0</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-pinky/10 rounded-3xl p-6 shadow-card border border-white">
                <h2 class="text-xl font-medium mb-4 text-center text-brown">how to pay</h2>
                <button onclick="window.open('https://koomi-web.github.io/payforiluvjkjm/', '_blank')" class="w-full bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-pinky-light/30">
                    <span class="font-medium text-brown">ชำระเงิน</span>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-pinky"></i>
                </button>
            </section>

        </main>

        <footer class="bg-white pt-10 pb-12 px-6 rounded-t-[40px] text-center border-t border-pinky-light shadow-soft">
            <div class="flex justify-center gap-3 mb-8">
                <a href="https://x.com/iluvjkjm_" target="_blank" class="flex-1 bg-pinky-dark text-white py-3 rounded-full text-[11px] font-bold">TWITTER (X)</a>
                <a href="https://lin.ee/xt1vCQ8" target="_blank" class="flex-1 bg-white border-2 border-pinky-dark text-pinky-dark py-3 rounded-full text-[11px] font-bold">LINE</a>
            </div>
            <p class="text-[11px] text-brown-light italic">Thank you for choosing iluvjkjm_ 💖</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        // 1. วางลิงก์ CSV จาก Google Sheets ของคุณที่นี่
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/13bW6-V_RkDaCv6MoOdtmjcmDNH5O0y8FfO6sRAtAqhg/edit?usp=drivesdk';

        // ฟังก์ชันดึงข้อมูลทั้งหมดจาก Sheets มานับจำนวนคิวและใช้ค้นหา
        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                // แยกแถวและคอลัมน์ (รองรับ CSV)
                return data.split('\n').map(row => row.split(',').map(cell => cell.trim()));
            } catch (e) {
                console.error("Error fetching data", e);
                return [];
            }
        }

        // อัปเดตตัวเลขคิวหน้าเว็บอัตโนมัติจากข้อมูลในชีต
        async function updateQueueCounts() {
            const rows = await fetchSheetData();
            if (rows.length < 2) return;

            // สมมติว่า Column ที่ 3 (Index 2) คือ "สถานะ"
            let wait = 0, process = 0, done = 0;
            
            rows.slice(1).forEach(row => {
                const status = row[2];
                if (status === 'รอทำ') wait++;
                else if (status === 'กำลังทำ') process++;
                else if (status === 'เสร็จสิ้น') done++;
            });

            document.getElementById('count-wait').innerText = wait;
            document.getElementById('count-process').innerText = process;
            document.getElementById('count-done').innerText = done;
        }

        // ฟังก์ชันเช็คสถานะรายคน
        async function checkStatus() {
            const inputId = document.getElementById('orderInput').value.trim().toUpperCase();
            if (!inputId) return alert("กรุณากรอกรหัสคิวงานค่ะ");

            const btn = document.getElementById('searchBtn');
            btn.disabled = true;

            const rows = await fetchSheetData();
            const result = rows.find(row => row[0].toUpperCase() === inputId);

            if (result) {
                alert(`🎀 ข้อมูลคิวงาน: ${result[0]}\n----------------------------\nลูกค้า: ${result[1]}\nสถานะ: ${result[2]}\nความคืบหน้า: ${result[3]}\nรายละเอียด: ${result[4] || '-'}`);
            } else {
                alert("❌ ไม่พบรหัสคิวงานนี้ กรุณาตรวจสอบอีกครั้งค่ะ");
            }
            btn.disabled = false;
        }

        // รันการนับคิวเมื่อเปิดหน้าเว็บ
        updateQueueCounts();
    </script>
</body>
</html>
